name: Release SMG+TRTLLM Docker Image

run-name: >-
  SMG+TRTLLM |
  base=${{ inputs.base_image_ref }} |
  engine=${{ inputs.trtllm_commit }} |
  smg=${{ inputs.smg_commit }} |
  by @${{ github.actor }}

on:
  push:
    branches: [main]
    paths:
      - bindings/python/pyproject.toml
  workflow_dispatch:
    inputs:
      base_image_ref:
        description: 'Base image (e.g. nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc7). Empty = build from source.'
        default: 'nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc7'
        required: false
        type: string
      trtllm_repo:
        description: 'TRTLLM repo URL (required when base_image_ref is empty to build from source)'
        required: false
        type: string
      trtllm_commit:
        description: 'TRTLLM commit/ref ("latest" for HEAD)'
        required: false
        default: 'latest'
        type: string
      smg_repo:
        description: 'SMG repo URL'
        required: false
        default: 'https://github.com/lightseekorg/smg'
        type: string
      smg_commit:
        description: 'SMG commit/ref ("latest" for HEAD)'
        required: false
        default: 'v1.3.1'
        type: string
      tag:
        description: 'Override image tag (e.g. v1.3.1-trtllm-1.3.0)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/_build-engine-image.yml
    with:
      engine: trtllm
      base_image_ref: ${{ inputs.base_image_ref || 'nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc7' }}
      engine_repo: ${{ inputs.trtllm_repo }}
      engine_commit: ${{ inputs.trtllm_commit || 'latest' }}
      smg_repo: ${{ inputs.smg_repo || 'https://github.com/lightseekorg/smg' }}
      smg_commit: ${{ github.event_name == 'pull_request' && 'main' || inputs.smg_commit || 'v1.3.1' }}
      tag: ${{ inputs.tag }}
      source_build_repo: ${{ inputs.trtllm_repo }}
      source_build_ref: ${{ inputs.trtllm_commit || 'latest' }}
    secrets: inherit
