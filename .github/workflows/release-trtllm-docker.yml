name: Release SMG+TRTLLM Docker Image

run-name: >-
  SMG+TRTLLM |
  ${{ github.event_name == 'push' && '3-version matrix' || format('base={0}', inputs.base_image_ref || 'nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8') }} |
  engine=${{ inputs.trtllm_commit || 'latest' }} |
  smg=${{ github.event_name == 'pull_request' && 'main' || inputs.smg_commit || 'v1.3.3' }} |
  ${{ github.event_name == 'pull_request' && 'dry-run |' || '' }}
  by @${{ github.actor }}

on:
  push:
    branches: [main]
    paths:
      - bindings/python/pyproject.toml
  pull_request:
    branches: [main]
    paths:
      - 'docker/engine.Dockerfile'
      - '.github/workflows/_build-engine-image.yml'
      - '.github/workflows/release-*-docker.yml'
      - 'scripts/installation/**'
  workflow_dispatch:
    inputs:
      base_image_ref:
        description: 'Base image (e.g. nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8). Empty = build from source.'
        default: 'nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8'
        required: false
        type: string
      trtllm_repo:
        description: 'TRTLLM repo URL (required when base_image_ref is empty to build from source)'
        required: false
        type: string
      trtllm_commit:
        description: 'TRTLLM commit/ref ("latest" for HEAD)'
        required: false
        default: 'latest'
        type: string
      smg_repo:
        description: 'SMG repo URL'
        required: false
        default: 'https://github.com/lightseekorg/smg'
        type: string
      smg_commit:
        description: 'SMG commit/ref ("latest" for HEAD)'
        required: false
        default: 'v1.3.3'
        type: string
      tag:
        description: 'Override image tag (e.g. v1.3.3-trtllm-1.3.0)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        base_image: ${{ github.event_name == 'push' && fromJSON('["nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8","nvcr.io/nvidia/tensorrt-llm/release:1.2.0","nvcr.io/nvidia/tensorrt-llm/release:1.1.0"]') || fromJSON(format('["{0}"]', inputs.base_image_ref || 'nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc8')) }}
    uses: ./.github/workflows/_build-engine-image.yml
    with:
      engine: trtllm
      base_image_ref: ${{ matrix.base_image }}
      engine_repo: ${{ inputs.trtllm_repo }}
      engine_commit: ${{ inputs.trtllm_commit || 'latest' }}
      smg_repo: ${{ inputs.smg_repo || 'https://github.com/lightseekorg/smg' }}
      smg_commit: ${{ github.event_name == 'pull_request' && 'main' || inputs.smg_commit || 'v1.3.3' }}
      tag: ${{ inputs.tag }}
      source_build_repo: ${{ inputs.trtllm_repo }}
      source_build_ref: ${{ inputs.trtllm_commit || 'latest' }}
      dry_run: ${{ github.event_name == 'pull_request' }}
    secrets: inherit
