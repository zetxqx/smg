name: Release SMG+SGLang Docker Image

run-name: >-
  SMG+SGLang |
  ${{ github.event_name == 'push' && '3-version matrix' || format('base={0}', inputs.base_image_ref || 'lmsysorg/sglang:v0.5.9') }} |
  engine=${{ inputs.sglang_commit || 'latest' }} |
  smg=${{ github.event_name == 'pull_request' && 'main' || inputs.smg_commit || 'v1.3.3' }} |
  ${{ github.event_name == 'pull_request' && 'dry-run |' || '' }}
  by @${{ github.actor }}

on:
  push:
    branches: [main]
    paths:
      - bindings/python/pyproject.toml
  pull_request:
    branches: [main]
    paths:
      - 'docker/engine.Dockerfile'
      - '.github/workflows/_build-engine-image.yml'
      - '.github/workflows/release-*-docker.yml'
      - 'scripts/installation/**'
  workflow_dispatch:
    inputs:
      base_image_ref:
        description: 'Base image (e.g. lmsysorg/sglang:v0.5.9)'
        default: 'lmsysorg/sglang:v0.5.9'
        required: true
        type: string
      sglang_repo:
        description: 'SGLang repo URL (empty = use engine from base image)'
        required: false
        type: string
      sglang_commit:
        description: 'SGLang commit/ref ("latest" for HEAD)'
        required: false
        default: 'latest'
        type: string
      smg_repo:
        description: 'SMG repo URL'
        required: false
        default: 'https://github.com/lightseekorg/smg'
        type: string
      smg_commit:
        description: 'SMG commit/ref ("latest" for HEAD)'
        required: false
        default: 'v1.3.3'
        type: string
      tag:
        description: 'Override image tag (e.g. v1.3.3-sglang-v0.5.9)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        base_image: ${{ github.event_name == 'push' && fromJSON('["lmsysorg/sglang:v0.5.9","lmsysorg/sglang:v0.5.8","lmsysorg/sglang:v0.5.7"]') || fromJSON(format('["{0}"]', inputs.base_image_ref || 'lmsysorg/sglang:v0.5.9')) }}
    uses: ./.github/workflows/_build-engine-image.yml
    with:
      engine: sglang
      base_image_ref: ${{ matrix.base_image }}
      engine_repo: ${{ inputs.sglang_repo }}
      engine_commit: ${{ inputs.sglang_commit || 'latest' }}
      smg_repo: ${{ inputs.smg_repo || 'https://github.com/lightseekorg/smg' }}
      smg_commit: ${{ github.event_name == 'pull_request' && 'main' || inputs.smg_commit || 'v1.3.3' }}
      tag: ${{ inputs.tag }}
      dry_run: ${{ github.event_name == 'pull_request' }}
    secrets: inherit
