name: PR Test (SMG)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "*.md"
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gateway-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  GENAI_BENCH_IMAGE: ghcr.io/moirai-internal/genai-bench:0.0.3

jobs:
  pre-commit:
    runs-on: k8s-runner-cpu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit checks
        env:
          SKIP: rustfmt,clippy,no-commit-to-branch,branch-name-check,dco-check
        run: pre-commit run --all-files --show-diff-on-failure

  python-lint:
    runs-on: k8s-runner-cpu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff check
        run: ruff check e2e_test/ bindings/python/ scripts/

      - name: Ruff format check
        run: ruff format --check e2e_test/ bindings/python/ scripts/

      - name: Mypy (e2e_test)
        run: mypy e2e_test/ --config-file mypy.ini

      - name: Mypy (bindings/python)
        run: mypy bindings/python/ --config-file mypy.ini

  grpc-proto-build-check:
    runs-on: k8s-runner-cpu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Copy protos and build
        run: |
          rm -f grpc_client/python/smg_grpc_proto/proto
          mkdir -p grpc_client/python/smg_grpc_proto/proto
          cp grpc_client/proto/*.proto grpc_client/python/smg_grpc_proto/proto/
          pip install build grpcio-tools
          rm -rf grpc_client/python/dist/
          cd grpc_client/python && python -m build

      - name: Test import
        run: |
          pip install grpc_client/python/dist/*.whl
          python -c "from smg_grpc_proto import sglang_scheduler_pb2; print('OK')"

  build-wheel:
    runs-on: k8s-runner-gpu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Cache wheel and Go FFI artifacts
        id: cache-wheel
        uses: actions/cache@v5
        with:
          path: |
            bindings/python/dist/*.whl
            bindings/golang/target/release/libsmg_go.*
            wasm/tests/fixtures/*.wasm
            clients/python/smg_client/types/_generated.py
          key: wheel-${{ runner.os }}-${{ hashFiles('Cargo.lock', '**/Cargo.toml', 'auth/src/**', 'bindings/python/src/**', 'data_connector/src/**', 'grpc_client/src/**', 'kv_index/src/**', 'mcp/src/**', 'mesh/src/**', 'model_gateway/src/**', 'multimodal/src/**', 'protocols/src/**', 'reasoning_parser/src/**', 'tokenizer/src/**', 'tool_parser/src/**', 'wasm/src/**', 'workflow/src/**', 'bindings/golang/src/**', 'examples/wasm/**') }}
          restore-keys: |
            wheel-${{ runner.os }}-

      - name: Setup Rust
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust

      - name: Build Python wheel and Go FFI library
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        run: |
          rm -rf bindings/python/dist/
          bash scripts/ci_setup_python_venv.sh
          bash scripts/ci_build_wheel.sh

      - name: Generate Python client types
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        run: |
          source "$HOME/.cargo/env"
          mkdir -p clients/openapi
          cargo run -p openapi-gen -- clients/openapi/smg-openapi.yaml
          pip install 'datamodel-code-generator==0.54.0'
          datamodel-codegen \
            --input clients/openapi/smg-openapi.yaml \
            --input-file-type openapi \
            --output clients/python/smg_client/types/_generated.py \
            --output-model-type pydantic_v2.BaseModel \
            --use-annotated \
            --field-constraints \
            --target-python-version 3.10 \
            --collapse-root-models \
            --use-standard-collections \
            --use-union-operator
          sed -i 's/class \(.*\)(Enum):/class \1(str, Enum):/' clients/python/smg_client/types/_generated.py

      - name: Build WASM test fixtures
        if: steps.cache-wheel.outputs.cache-hit != 'true'
        run: |
          source "$HOME/.cargo/env"
          bash wasm/tests/fixtures/build_fixtures.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: smg-wheel
          path: bindings/python/dist/*.whl
          retention-days: 1

      - name: Upload Go FFI library artifact
        uses: actions/upload-artifact@v6
        with:
          name: go-ffi-library
          path: bindings/golang/target/release/libsmg_go.*
          retention-days: 1

      - name: Upload Python client types
        uses: actions/upload-artifact@v6
        with:
          name: python-client-types
          path: clients/python/smg_client/types/_generated.py
          retention-days: 1

      - name: Upload WASM test fixtures
        uses: actions/upload-artifact@v6
        with:
          name: wasm-test-fixtures
          path: wasm/tests/fixtures/*.wasm
          retention-days: 1
          if-no-files-found: ignore

      - name: Show sccache stats
        if: always() && steps.cache-wheel.outputs.cache-hit != 'true'
        run: sccache --show-stats

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test wheel install
        run: |
          pip install bindings/python/dist/*.whl
          python3 -c "import smg; print('Python package: OK')"
          python3 -c "from smg.smg_rs import Router; print('Rust extension: OK')"
          python3 -m smg.launch_router --help > /dev/null && echo "Entry point: OK"

  python-unit-tests:
    needs: build-wheel
    runs-on: k8s-runner-cpu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: smg-wheel
          path: dist/

      - name: Install wheel
        run: pip install dist/*.whl

      - name: Run Python unit tests
        run: |
          cd bindings/python
          python3 -m pip install pytest pytest-cov pytest-xdist
          pytest -q tests --cov=smg --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=80

  unit-tests:
    runs-on: k8s-runner-cpu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build WASM test fixtures
        run: |
          source "$HOME/.cargo/env"
          bash wasm/tests/fixtures/build_fixtures.sh

      - name: Run lint
        run: |
          source "$HOME/.cargo/env"
          rustup component add clippy
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Run fmt
        run: |
          source "$HOME/.cargo/env"
          rustup component add --toolchain nightly-x86_64-unknown-linux-gnu rustfmt
          rustup toolchain install nightly --profile minimal
          cargo +nightly fmt -- --check

      - name: Generate vision golden fixtures
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

          pip install transformers pillow numpy scipy
          python multimodal/scripts/generate_vision_golden.py

      - name: Run Rust tests
        timeout-minutes: 30
        run: |
          source "$HOME/.cargo/env"
          cargo test

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  gateway-e2e:
    name: ${{ matrix.name }}
    needs: build-wheel
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: benchmarks
            timeout: 20
            test_dirs: "e2e_test/benchmarks"
            extra_deps: ""
            env_vars: ""
            reruns: ""
            upload_benchmarks: true
            parallel_opts: ""  # No parallel for benchmarks (performance measurement)
            ignore_opts: "--ignore=e2e_test/benchmarks/test_go_bindings_perf.py --ignore=e2e_test/benchmarks/test_nightly_perf.py"  # Go and nightly benchmarks run in dedicated jobs
            runner: 4-gpu-h100
          - name: agentic-apis
            timeout: 30
            test_dirs: "e2e_test/responses e2e_test/messages"
            extra_deps: ""
            env_vars: "SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1"
            reruns: "--reruns 2 --reruns-delay 5"
            setup_agentic_deps: true
            parallel_opts: ""
            ignore_opts: ""
            test_filter: "-m 'not external'"
          - name: e2e
            timeout: 20
            test_dirs: "e2e_test/router e2e_test/embeddings"
            # py is needed for pytest-parallel; sentence-transformers provides HuggingFace reference embeddings
            extra_deps: "pytest-parallel py sentence-transformers"
            env_vars: "SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1"
            reruns: "--reruns 2 --reruns-delay 5"
            parallel_opts: "--workers 1 --tests-per-worker 4"  # Thread-based parallelism
            ignore_opts: ""
          - name: chat-completions-sglang
            timeout: 20
            test_dirs: "e2e_test/chat_completions"
            extra_deps: "pytest-parallel py"
            env_vars: "E2E_RUNTIME=sglang SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1"
            reruns: "--reruns 2 --reruns-delay 5"
            parallel_opts: "--workers 1 --tests-per-worker 4"
            test_filter: ""
            ignore_opts: ""
          - name: chat-completions-vllm
            timeout: 20
            test_dirs: "e2e_test/chat_completions"
            extra_deps: "pytest-parallel py"
            env_vars: "E2E_RUNTIME=vllm SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1"
            reruns: "--reruns 2 --reruns-delay 5"
            parallel_opts: "--workers 1 --tests-per-worker 4"
            # TODO: Remove filter when vLLM supports logprobs and n>1 with greedy sampling
            # Excludes: 5-grpc (logprobs=5), 2-None-grpc (n=2 with no logprobs), multiple_choices (n=2 tests)
            test_filter: "-k 'not (5-grpc or 2-None-grpc or multiple_choices)'"
            setup_vllm: true
            ignore_opts: ""
          - name: vllm-pd
            timeout: 15
            test_dirs: "e2e_test/router/test_pd_mmlu.py"
            extra_deps: ""
            env_vars: "E2E_RUNTIME=vllm SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1"
            reruns: "--reruns 2 --reruns-delay 5"
            parallel_opts: ""
            test_filter: ""
            setup_vllm: true
            ignore_opts: ""
          - name: chat-completions-trtllm
            timeout: 60
            test_dirs: "e2e_test/chat_completions"
            extra_deps: "pytest-parallel py"
            env_vars: "E2E_RUNTIME=trtllm SHOW_WORKER_LOGS=1 SHOW_ROUTER_LOGS=1"
            reruns: "--reruns 2 --reruns-delay 5"
            parallel_opts: "--workers 1 --tests-per-worker 4"
            test_filter: ""
            setup_trtllm: true
            ignore_opts: ""
            runner: 4-gpu-h100
    runs-on: ${{ matrix.runner || 'k8s-runner-gpu' }}
    timeout-minutes: ${{ matrix.timeout }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check shared services
        if: matrix.setup_agentic_deps
        run: bash scripts/ci_agentic_svc_deps.sh check --oracle oracle-db --brave brave-search-mcp

      - name: Setup vLLM backend
        if: matrix.setup_vllm
        uses: ./.github/actions/setup-vllm

      - name: Setup TRT-LLM backend
        if: matrix.setup_trtllm
        uses: ./.github/actions/setup-trtllm

      - name: Setup SGLang backend
        if: ${{ !matrix.setup_vllm && !matrix.setup_trtllm }}
        uses: ./.github/actions/setup-sglang

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: smg-wheel
          path: wheel/

      - name: Download WASM test fixtures
        uses: actions/download-artifact@v8
        with:
          name: wasm-test-fixtures
          path: wasm/tests/fixtures/
        continue-on-error: true

      - name: Download Python client types
        uses: actions/download-artifact@v8
        with:
          name: python-client-types
          path: clients/python/smg_client/types/

      - name: Install wheel and test dependencies
        run: |
          pip uninstall -y smg || true
          pip install wheel/*.whl
          bash scripts/ci_install_e2e_deps.sh ${{ matrix.extra_deps }}

      - name: Pull genai-bench image
        if: matrix.upload_benchmarks
        run: docker pull ${{ env.GENAI_BENCH_IMAGE }}

      - name: Setup Oracle
        if: matrix.setup_agentic_deps
        run: |
          bash scripts/ci_agentic_svc_deps.sh setup-oracle-client
          bash scripts/ci_agentic_svc_deps.sh create-oracle-user oracle-db
          bash scripts/ci_agentic_svc_deps.sh create-oracle-flyway-user oracle-db

      - name: Run E2E tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_MCP_HOST: ${{ matrix.setup_agentic_deps && 'brave-search-mcp' || '' }}
        run: |
          bash scripts/ci_killall_sglang.sh "nuk_gpus"
          ${{ matrix.env_vars }} ROUTER_LOCAL_MODEL_PATH="/home/ubuntu/models" pytest ${{ matrix.reruns }} ${{ matrix.parallel_opts }} ${{ matrix.ignore_opts }} ${{ matrix.test_dirs }} ${{ matrix.test_filter }} -s -vv -o log_cli=true --log-cli-level=INFO

      - name: Cleanup Oracle test users
        if: always() && matrix.setup_agentic_deps
        run: |
          bash scripts/ci_agentic_svc_deps.sh cleanup-oracle-flyway-user oracle-db
          bash scripts/ci_agentic_svc_deps.sh cleanup-oracle-user oracle-db

      - name: Upload benchmark results
        if: matrix.upload_benchmarks && success()
        uses: actions/upload-artifact@v6
        with:
          name: genai-bench-results-all-policies
          path: benchmark_**/

  go-unit-tests:
    name: go-unit-tests
    needs: build-wheel
    runs-on: k8s-runner-cpu
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: bindings/golang/go.sum

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Download Go FFI library
        uses: actions/download-artifact@v8
        with:
          name: go-ffi-library
          path: bindings/golang/target/release/

      - name: Verify Go FFI library
        run: ls -la bindings/golang/target/release/libsmg_go.*

      - name: Run Go unit tests
        run: |
          cd bindings/golang
          export CGO_ENABLED=1
          export CGO_LDFLAGS="-L$(pwd)/target/release"
          export LD_LIBRARY_PATH="$(pwd)/target/release:$LD_LIBRARY_PATH"
          go test -v ./...

  go-bindings-e2e:
    name: go-bindings-e2e
    needs: build-wheel
    if: github.actor != 'dependabot[bot]'
    runs-on: k8s-runner-gpu
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SGLang backend
        uses: ./.github/actions/setup-sglang

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: bindings/golang/go.sum

      - name: Download Go FFI library
        uses: actions/download-artifact@v8
        with:
          name: go-ffi-library
          path: bindings/golang/target/release/

      - name: Verify Go FFI library
        run: ls -la bindings/golang/target/release/libsmg_go.*

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: smg-wheel
          path: wheel/

      - name: Download Python client types
        uses: actions/download-artifact@v8
        with:
          name: python-client-types
          path: clients/python/smg_client/types/

      - name: Install wheel and test dependencies
        run: |
          pip uninstall -y smg || true
          pip install wheel/*.whl
          bash scripts/ci_install_e2e_deps.sh

      - name: Run Go OAI server E2E tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          bash scripts/ci_killall_sglang.sh "nuk_gpus"
          export CGO_LDFLAGS="-L$(pwd)/bindings/golang/target/release"
          export LD_LIBRARY_PATH="$(pwd)/bindings/golang/target/release:$LD_LIBRARY_PATH"
          SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1 ROUTER_LOCAL_MODEL_PATH="/home/ubuntu/models" \
            pytest --reruns 2 --reruns-delay 5 e2e_test/bindings_go -s -vv -o log_cli=true --log-cli-level=INFO

  go-bindings-benchmark:
    name: go-bindings-benchmark
    needs: build-wheel
    if: false  # Disabled
    runs-on: k8s-runner-gpu
    timeout-minutes: 32
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SGLang backend
        uses: ./.github/actions/setup-sglang

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: bindings/golang/go.sum

      - name: Download Go FFI library
        uses: actions/download-artifact@v8
        with:
          name: go-ffi-library
          path: bindings/golang/target/release/

      - name: Verify Go FFI library
        run: ls -la bindings/golang/target/release/libsmg_go.*

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: smg-wheel
          path: wheel/

      - name: Install wheel
        run: |
          pip uninstall -y smg || true
          pip install wheel/*.whl

      - name: Install test dependencies
        run: |
          python3 -m pip install pytest pytest-rerunfailures httpx openai grpcio grpcio-health-checking numpy

      - name: Pull genai-bench image
        run: docker pull ${{ env.GENAI_BENCH_IMAGE }}

      - name: Run Go bindings benchmark
        run: |
          bash scripts/ci_killall_sglang.sh "nuk_gpus"
          export CGO_LDFLAGS="-L$(pwd)/bindings/golang/target/release"
          export LD_LIBRARY_PATH="$(pwd)/bindings/golang/target/release:$LD_LIBRARY_PATH"
          SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1 ROUTER_LOCAL_MODEL_PATH="/home/ubuntu/models" \
            pytest e2e_test/benchmarks/test_go_bindings_perf.py -s -vv -o log_cli=true --log-cli-level=INFO

      - name: Upload benchmark results
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: genai-bench-results-go-bindings
          path: benchmark_go_bindings/

  finish:
    needs: [pre-commit, python-lint, grpc-proto-build-check, build-wheel, python-unit-tests, unit-tests, gateway-e2e, go-unit-tests, go-bindings-e2e]
    if: always()
    runs-on: k8s-runner-cpu
    permissions: {}
    steps:
      - name: Check CI result
        run: |
          if [[ "${{ needs.pre-commit.result }}" == "failure" || \
                "${{ needs.python-lint.result }}" == "failure" || \
                "${{ needs.grpc-proto-build-check.result }}" == "failure" || \
                "${{ needs.build-wheel.result }}" == "failure" || \
                "${{ needs.python-unit-tests.result }}" == "failure" || \
                "${{ needs.unit-tests.result }}" == "failure" || \
                "${{ needs.gateway-e2e.result }}" == "failure" || \
                "${{ needs.go-unit-tests.result }}" == "failure" || \
                "${{ needs.go-bindings-e2e.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          else
            echo "All jobs completed successfully"
          fi

  summarize-benchmarks:
    needs: [gateway-e2e]
    runs-on: k8s-runner-cpu
    if: success()
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Download gateway benchmark results
      uses: actions/download-artifact@v8
      with:
        name: genai-bench-results-all-policies

    - name: Create benchmark summary
      run: python3 e2e_test/benchmarks/summarize.py .
